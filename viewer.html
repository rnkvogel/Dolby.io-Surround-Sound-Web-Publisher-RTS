<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dolby.io Audio Viewer Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/@millicast/sdk/dist/millicast.umd.min.js"></script>
  <script defer src="viewer.js"></script>
  <style>
    :root {
      --bg:#070d18; --panel:rgba(12,20,36,.95); --panel2:#14203a; --panel3:#0d1527;
      --border:rgba(139,155,200,.18); --text:#edf2ff; --muted:#9aa7c9; --accent:#7b8dff;
      --accent2:#57f0c7; --accent3:#ff7dde; --danger:#ff6f8e; --shadow:0 24px 72px rgba(0,0,0,.34);
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:radial-gradient(circle at top,rgba(123,141,255,.2),transparent 28%),linear-gradient(180deg,#091120,var(--bg))
    }
    .page{max-width:1400px;margin:0 auto;padding:18px}
    .hero,.panel{background:var(--panel);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow)}
    .hero{padding:24px;margin-bottom:18px}
    .hero h1{margin:0 0 8px;font-size:clamp(1.8rem,2.4vw,2.7rem)}
    .hero p{margin:0;max-width:1000px;color:var(--muted)}
    .stack{display:grid;gap:18px}
    .panel{padding:18px}
    .field-grid{display:grid;grid-template-columns:1.4fr 160px;gap:12px}
    label{display:block;font-size:.86rem;color:var(--muted);margin-bottom:6px}
    input,textarea{
      width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(139,155,200,.18);
      background:var(--panel3);color:var(--text);outline:none
    }
    textarea{min-height:220px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    button{border:0;border-radius:14px;padding:12px 16px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--accent),#a45fff)}
    button.secondary{background:#182443}
    button.danger{background:linear-gradient(135deg,#ff835f,var(--danger))}
    button:disabled{opacity:.55;cursor:not-allowed}
    .button-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .status-line{min-height:1.3em;color:var(--accent2);margin-top:12px}
    .meta-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:14px}
    .meta-card,.audio-card{
      background:var(--panel2);border:1px solid var(--border);border-radius:18px;padding:14px
    }
    .meta-card span,.subtle{color:var(--muted)}
    .meta-card strong{display:block;margin-top:6px;font-size:1.04rem}
    .audio-list{display:grid;gap:12px}
    .audio-card h3{margin:0 0 6px;font-size:1rem}
    .audio-card p{margin:0;color:var(--muted);font-size:.9rem}
    audio{width:100%;margin-top:12px}
    .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .pill{padding:8px 10px;border-radius:999px;background:rgba(123,141,255,.16);border:1px solid rgba(123,141,255,.16);font-size:.78rem}
    @media (max-width:1000px){.field-grid,.meta-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Audio Viewer</h1>
      <p>
        Lightweight audio-only viewer for MultiOpus testing. 
      </p>
    </section>

    <div class="stack">
      <section class="panel">
        <div class="field-grid">
          <div>
            <label for="streamIdInput">Stream ID</label>
            <input id="streamIdInput" placeholder="accountId/streamName" />
          </div>
          <div>
            <label for="autoStartToggle">Auto start</label>
            <input id="autoStartToggle" value="true" />
          </div>
        </div>
        <div class="button-row">
          <button id="startBtn">Start</button>
          <button id="stopBtn" class="danger" disabled>Stop</button>
          <button id="copyLogsBtn" class="secondary">Copy logs</button>
        </div>
        <div id="statusLine" class="status-line">Idle</div>

        <div class="meta-grid">
          <div class="meta-card"><span>Status</span><strong id="viewerState">Idle</strong></div>
          <div class="meta-card"><span>Tracks</span><strong id="trackCount">0</strong></div>
          <div class="meta-card"><span>Codec</span><strong id="codecState">Unknown</strong></div>
          <div class="meta-card"><span>Stream</span><strong id="streamState">Not connected</strong></div>
        </div>
      </section>

      <section class="panel">
        <h2 style="margin:0 0 12px;">Audio outputs</h2>
        <div id="audioList" class="audio-list"></div>
      </section>

      <section class="panel">
        <label for="debugLog">Debug log</label>
        <textarea id="debugLog" readonly placeholder="Debug logs appear here"></textarea>
      </section>
    </div>
  </div>
</body>
</html>
